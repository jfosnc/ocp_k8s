apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: approved-demo
  namespace: openshift-gitops
spec:
  destination:
    namespace: demo-gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/jfosnc/ocp_k8s.git
    targetRevision: HEAD
    path: repo/workloads/compliant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
